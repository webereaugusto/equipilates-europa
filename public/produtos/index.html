        function getLang() {
            return localStorage.getItem('language') || window.currentLang || 'es';
        }

        function l(key) {
            var lang = getLang();
            return (labels[lang] && labels[lang][key]) || labels['es'][key] || key;
        }

        function buildWaLink() {
            return 'https://wa.me/' + WA_PHONE;
        }

        function updateStaticTexts() {
            if (!_product) {
                document.title = l('defaultPageTitle');
            }

            var loading = document.querySelector('[data-loading-text]');
            if (loading) loading.textContent = l('loading');

            var descTab = document.querySelector('[data-static-tab="desc"]');
            if (descTab) descTab.textContent = l('descTab');
            var specsTab = document.querySelector('[data-static-tab="specs"]');
            if (specsTab) specsTab.textContent = l('specsTab');
            var optTab = document.querySelector('[data-static-tab="opt"]');
            if (optTab) optTab.textContent = l('optTab');

            var navWa = document.querySelector('[data-wa-link="nav"]');
            if (navWa) navWa.href = buildWaLink();
            var floatWa = document.querySelector('[data-wa-link="float"]');
            if (floatWa) {
                floatWa.href = buildWaLink();
            }
        }

        function getTranslatedField(product, field) {
            var lang = getLang();
            if (lang === 'pt-BR') return product[field] || '';
            var translated = product[field + '_' + lang];
            return translated || product[field] || '';
        }

        function isAccessory(product) {
            return product.category && product.category.slug === 'acessorios';
        }

        // ==========================================
        // SELETOR DE IDIOMA
        // ==========================================

        function applyLangUI(lang) {
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                var isActive = btn.dataset.lang === lang;
                btn.classList.toggle('active', isActive);
                if (isActive) {
                    var label = btn.dataset.label || btn.textContent.trim();
                    var toggleLabel = document.querySelector('.lang-toggle .lang-toggle-label');
                    if (toggleLabel) toggleLabel.textContent = label;
                }
            });
            document.documentElement.lang = lang === 'pt-BR' ? 'pt-BR' : lang;
        }

        function onLangChange(newLang) {
            // Salvar preferência e atualizar i18n.js
            localStorage.setItem('language', newLang);
            if (typeof window.changeLanguage === 'function') {
                window.changeLanguage(newLang);
            } else {
                // i18n.js ainda não carregou — aguardar e aplicar
                window.currentLang = newLang;
            }
            applyLangUI(newLang);
            updateStaticTexts();
            // Re-renderizar conteúdo do produto no novo idioma
            if (_product) refreshProductContent();
        }

        function initLangSwitcher() {
            var langDropdown = document.querySelector('.lang-dropdown');
            var langToggle = langDropdown && langDropdown.querySelector('.lang-toggle');

            // Sincronizar visual com o idioma atual
            applyLangUI(getLang());
            updateStaticTexts();

            // Botões de idioma
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var newLang = btn.dataset.lang;
                    onLangChange(newLang);
                    if (langDropdown && langDropdown.classList.contains('open')) {
                        langDropdown.classList.remove('open');
                        if (langToggle) langToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            });

            // Toggle abrir/fechar dropdown
            if (langToggle && langDropdown) {
                langToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var isOpen = langDropdown.classList.toggle('open');
                    langToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                });

                document.addEventListener('click', function(e) {
                    if (!langDropdown.contains(e.target) && langDropdown.classList.contains('open')) {
                        langDropdown.classList.remove('open');
                        langToggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }
        }

        // ==========================================
        // ATUALIZAÇÃO DE CONTEÚDO AO TROCAR IDIOMA
        // ==========================================

        function refreshProductContent() {
            var product = _product;
            if (!product) return;
            var detail = document.getElementById('productDetail');
            if (!detail) return;

            var title = getTranslatedField(product, 'title');
            var shortDesc = getTranslatedField(product, 'short_description');
            var detailedDesc = getTranslatedField(product, 'detailed_description');
            var isAcc = isAccessory(product);

            document.title = title + ' | ' + l('titleSuffix');
            var metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', shortDesc.substring(0, 160));

            var el = function(sel) { return detail.querySelector(sel); };

            var bc = el('.product-breadcrumb a[data-i18n="nav.produtos"]');
            if (bc) bc.textContent = l('breadProducts');
            var bcCurrent = el('.breadcrumb-current');
            if (bcCurrent) bcCurrent.textContent = title;

            var titleEl = el('.product-title');
            if (titleEl) titleEl.textContent = title;
            var shortDescEl = el('.product-short-desc');
            if (shortDescEl) shortDescEl.textContent = shortDesc;

            var warrantyEl = el('.feature-warranty');
            if (warrantyEl) warrantyEl.textContent = isAcc ? l('warranty3m') : l('warranty2y');
            var shippingEl = el('.feature-shipping');
            if (shippingEl) shippingEl.textContent = l('shipping');
            var qualityEl = el('.feature-quality');
            if (qualityEl) qualityEl.textContent = l('quality');

            var ctaText = el('.cta-text');
            if (ctaText) ctaText.textContent = l('cta');
            var ctaLink = el('.product-cta');
            if (ctaLink) {
                ctaLink.href = buildWaLink();
            }

            var tabs = detail.querySelectorAll('.details-tab');
            if (tabs[0]) tabs[0].textContent = l('descTab');
            if (tabs[1]) tabs[1].textContent = l('specsTab');
            if (tabs[2]) tabs[2].textContent = l('optTab');

            var descContent = el('.desc-content');
            if (descContent) descContent.innerHTML = detailedDesc || shortDesc;

            // Atualizar mensagens de "sem dados" (specs e opcionais vazios)
            var tabPanels = detail.querySelectorAll('.tab-panel');
            if (tabPanels[1]) {
                var specsEmpty = tabPanels[1].querySelector('.empty-msg');
                if (specsEmpty) specsEmpty.textContent = l('noSpecs');
            }
            if (tabPanels[2]) {
                var optsEmpty = tabPanels[2].querySelector('.empty-msg');
                if (optsEmpty) optsEmpty.textContent = l('noOpt');
            }
        }

        // ==========================================
        // CARREGAMENTO DO PRODUTO
        // ==========================================

        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var slug = pathParts[pathParts.length - 1];

        if (!slug || slug === 'produtos') {
            window.location.href = '/#galeria';
            return;
        }

        // Inicializar seletor de idioma imediatamente (sem esperar o produto)
        document.addEventListener('DOMContentLoaded', function() {
            initLangSwitcher();
        });

        function waitForSupabase(cb, attempts) {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                cb();
            } else if (attempts < 50) {
                setTimeout(function() { waitForSupabase(cb, attempts + 1); }, 100);
            }
        }

        waitForSupabase(function() {
            var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            loadProduct(sb);
        }, 0);

        async function loadProduct(sb) {
            try {
                var prodResult = await sb
                    .from('products')
                    .select('*, category:categories(name, slug)')
                    .eq('slug', slug)
                    .eq('is_active', true)
                    .single();

                if (prodResult.error || !prodResult.data) {
                    showNotFound();
                    return;
                }

                var product = prodResult.data;

                var imgResult = await sb
                    .from('product_images')
                    .select('id, url, is_primary')
                    .eq('product_id', product.id)
                    .order('order_index');

                var images = (imgResult.data || []);

                _product = product;
                _images = images;
                renderProduct(product, images);

            } catch (err) {
                console.error('Erro ao carregar produto:', err);
                showNotFound();
            }
        }

        function showNotFound() {
            var detail = document.getElementById('productDetail');
            detail.innerHTML =
                '<div class="product-not-found">' +
                    '<h2>' + l('notFound') + '</h2>' +
                    '<a href="/" class="btn-back-home">' + l('backHome') + '</a>' +
                '</div>';
        }

        function renderProduct(product, images) {
            var template = document.getElementById('productTemplate');
            var detail = document.getElementById('productDetail');
            var clone = template.content.cloneNode(true);

            var title = getTranslatedField(product, 'title');
            var shortDesc = getTranslatedField(product, 'short_description');
            var detailedDesc = getTranslatedField(product, 'detailed_description');
            var catName = product.category ? product.category.name : '';
            var isAcc = isAccessory(product);

            document.title = title + ' | ' + l('titleSuffix');
            var metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', shortDesc.substring(0, 160));

            clone.querySelector('.breadcrumb-current').textContent = title;
            clone.querySelector('.product-breadcrumb a[data-i18n="nav.produtos"]').textContent = l('breadProducts');
            clone.querySelector('.product-category-label').textContent = catName;
            clone.querySelector('.product-title').textContent = title;
            clone.querySelector('.product-short-desc').textContent = shortDesc;

            clone.querySelector('.feature-warranty').textContent = isAcc ? l('warranty3m') : l('warranty2y');
            clone.querySelector('.feature-shipping').textContent = l('shipping');
            clone.querySelector('.feature-quality').textContent = l('quality');

            var ctaLink = clone.querySelector('#productCta');
            ctaLink.href = buildWaLink();
            ctaLink.removeAttribute('id');
            clone.querySelector('.cta-text').textContent = l('cta');

            // Imagens
            var mainImg = clone.querySelector('#mainImage');
            mainImg.removeAttribute('id');
            var primaryImg = images.find(function(i) { return i.is_primary; }) || images[0];
            if (primaryImg) {
                mainImg.src = primaryImg.url;
                mainImg.alt = title;
            }

            var thumbsContainer = clone.querySelector('#galleryThumbs');
            thumbsContainer.removeAttribute('id');
            if (images.length > 1) {
                images.forEach(function(img, idx) {
                    var thumb = document.createElement('button');
                    thumb.className = 'thumb-btn' + (img === primaryImg ? ' active' : '');
                    thumb.innerHTML = '<img src="' + img.url + '" alt="' + title + ' - ' + (idx + 1) + '" loading="lazy">';
                    thumb.addEventListener('click', function() {
                        mainImg.src = img.url;
                        thumbsContainer.querySelectorAll('.thumb-btn').forEach(function(t) { t.classList.remove('active'); });
                        thumb.classList.add('active');
                    });
                    thumbsContainer.appendChild(thumb);
                });
            }

            // Labels das abas
            var tabs = clone.querySelectorAll('.details-tab');
            tabs[0].textContent = l('descTab');
            tabs[1].textContent = l('specsTab');
            tabs[2].textContent = l('optTab');

            // Aba Descrição
            var descPanel = clone.querySelector('#tabDescription');
            descPanel.removeAttribute('id');
            descPanel.innerHTML = '<div class="desc-content">' + (detailedDesc || shortDesc) + '</div>';

            // Aba Especificações
            var specsPanel = clone.querySelector('#tabSpecs');
            specsPanel.removeAttribute('id');
            var specs = product.technical_specs;
            if (specs && Array.isArray(specs) && specs.length > 0) {
                specsPanel.innerHTML = '<ul class="specs-list">' +
                    specs.map(function(s) { return '<li>' + s + '</li>'; }).join('') +
                    '</ul>';
            } else {
                specsPanel.innerHTML = '<p class="empty-msg">' + l('noSpecs') + '</p>';
            }

            // Aba Opcionais
            var optPanel = clone.querySelector('#tabOptionals');
            optPanel.removeAttribute('id');
            var opts = product.optional_items;
            if (opts && Array.isArray(opts) && opts.length > 0) {
                optPanel.innerHTML = '<div class="optionals-grid">' +
                    opts.map(function(o) {
                        return '<div class="optional-item"><span class="opt-key">' + (o.key || o.name) + '</span><span class="opt-value">' + (o.value || '') + '</span></div>';
                    }).join('') +
                    '</div>';
            } else {
                optPanel.innerHTML = '<p class="empty-msg">' + l('noOpt') + '</p>';
            }

            detail.innerHTML = '';
            detail.appendChild(clone);

            // Troca de abas
            detail.querySelectorAll('.details-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    detail.querySelectorAll('.details-tab').forEach(function(t) { t.classList.remove('active'); });
                    detail.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
                    tab.classList.add('active');
                    var panel = detail.querySelector('.tab-panel:nth-child(' + (Array.from(tab.parentNode.children).indexOf(tab) + 1) + ')');
                    if (panel) panel.classList.add('active');
                });
            });

            // JSON-LD
            var jsonLd = {
                "@context": "https://schema.org",
                "@type": "Product",
                "name": title,
                "description": shortDesc,
                "brand": { "@type": "Brand", "name": "Equipilates" },
                "manufacturer": { "@type": "Organization", "name": "Equipilates" }
            };
            if (primaryImg) jsonLd.image = primaryImg.url;
            var scriptTag = document.createElement('script');
            scriptTag.type = 'application/ld+json';
            scriptTag.textContent = JSON.stringify(jsonLd);
            document.head.appendChild(scriptTag);
        }
    })();
    </script>
</body>
</html>
